<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chinh Phục Vũ Trụ Tri Thức - Lớp 4 & 5</title>
    <!-- Thêm Favicon Icon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><defs><linearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'><stop offset='0%25' style='stop-color:%2338bdf8;stop-opacity:1'/><stop offset='100%25' style='stop-color:%23c084fc;stop-opacity:1'/></linearGradient></defs><circle cx='50' cy='50' r='48' fill='url(%23g)'/><path d='M50 20 L65 55 L35 55 Z' fill='white'/><rect x='45' y='55' width='10' height='20' fill='white'/><path d='M30 75 Q50 65 70 75' stroke='white' stroke-width='4' fill='none'/></svg>">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --space-bg: #020617;
            --neon-blue: #38bdf8;
            --neon-purple: #c084fc;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--space-bg);
            color: white;
            overflow: hidden;
            user-select: none;
            margin: 0;
        }
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        
        .glass-panel {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .progress-bar {
            transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .stars-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            z-index: -1;
            overflow: hidden;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle var(--duration) infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .mission-card {
            transition: all 0.3s ease;
        }
        .mission-card:hover {
            transform: translateY(-5px);
            border-color: rgba(56, 189, 248, 0.6);
            background: rgba(255, 255, 255, 0.05);
        }

        .answer-btn {
            transition: all 0.2s ease;
        }
        .answer-btn:active {
            transform: scale(0.98);
        }

        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Hiệu ứng hào quang cho Icon */
        .icon-glow {
            filter: drop-shadow(0 0 15px rgba(56, 189, 248, 0.6));
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body class="h-screen flex items-center justify-center p-4">

    <div class="stars-container" id="stars-bg"></div>

    <div id="game-container" class="w-full max-w-4xl h-[650px] glass-panel rounded-[2.5rem] overflow-hidden relative flex flex-col shadow-2xl border border-white/10">
        
        <!-- HUD -->
        <div class="p-5 border-b border-white/5 flex justify-between items-center bg-slate-900/40">
            <div class="flex items-center gap-4">
                <button id="back-home" class="hidden p-2 rounded-xl bg-white/5 hover:bg-white/10 text-blue-400 transition-colors" onclick="showHomeScreen()">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                    </svg>
                </button>
                <div class="flex items-center gap-2">
                    <!-- Mini Logo in HUD -->
                    <svg width="30" height="30" viewBox="0 0 100 100" class="icon-glow">
                        <defs>
                            <linearGradient id="hudG" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:1" />
                                <stop offset="100%" style="stop-color:#c084fc;stop-opacity:1" />
                            </linearGradient>
                        </defs>
                        <circle cx="50" cy="50" r="45" fill="url(#hudG)" />
                        <path d="M50 25 L65 55 L35 55 Z" fill="white" />
                        <rect x="46" y="55" width="8" height="15" fill="white" />
                        <path d="M35 70 Q50 65 65 70" stroke="white" stroke-width="3" fill="none" />
                    </svg>
                    <div>
                        <div class="font-orbitron text-blue-400 tracking-tighter font-bold text-xl leading-none">SPACE QUEST</div>
                        <div class="text-[8px] text-blue-300/50 uppercase tracking-[0.2em]">Hệ thống thám hiểm tri thức</div>
                    </div>
                </div>
            </div>
            
            <div class="flex gap-8 items-center">
                <div class="text-right">
                    <div class="text-[10px] text-gray-400 uppercase font-bold">Cấp độ</div>
                    <div id="player-level" class="font-orbitron text-purple-400 text-lg">LVL 01</div>
                </div>
                <div class="hidden sm:block">
                    <div class="w-32 h-2 bg-gray-800 rounded-full overflow-hidden border border-white/5 mb-1">
                        <div id="xp-bar" class="progress-bar h-full bg-gradient-to-r from-blue-500 to-purple-500" style="width: 0%"></div>
                    </div>
                </div>
                <div class="text-right">
                    <div class="text-[10px] text-gray-400 uppercase font-bold">Điểm XP</div>
                    <div id="player-xp" class="font-orbitron text-yellow-400 text-lg">0000</div>
                </div>
            </div>
        </div>

        <!-- Screens -->
        <div class="flex-1 relative overflow-hidden p-8">
            
            <!-- HOME SCREEN -->
            <div id="home-screen" class="h-full flex flex-col items-center justify-center space-y-6 fade-in">
                
                <!-- Large Animated Icon -->
                <div class="mb-2">
                    <svg width="120" height="120" viewBox="0 0 100 100" class="icon-glow">
                        <defs>
                            <linearGradient id="mainG" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:1" />
                                <stop offset="100%" style="stop-color:#c084fc;stop-opacity:1" />
                            </linearGradient>
                            <filter id="shadow">
                                <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
                            </filter>
                        </defs>
                        <!-- Background Circle -->
                        <circle cx="50" cy="50" r="48" fill="url(#mainG)" />
                        <!-- Knowledge Book Base -->
                        <path d="M25 65 Q50 55 75 65 L75 75 Q50 65 25 75 Z" fill="white" opacity="0.9" />
                        <path d="M25 65 L25 75 M50 60 L50 70 M75 65 L75 75" stroke="rgba(0,0,0,0.1)" stroke-width="1" />
                        <!-- Rocket Knowledge Pencil -->
                        <path d="M50 20 L62 50 L38 50 Z" fill="white" filter="url(#shadow)" />
                        <rect x="44" y="50" width="12" height="12" fill="white" filter="url(#shadow)" />
                        <path d="M40 55 L35 62 L40 62 Z" fill="#38bdf8" />
                        <path d="M60 55 L65 62 L60 62 Z" fill="#38bdf8" />
                        <!-- Exhaust Flame -->
                        <path d="M46 65 Q50 85 54 65" fill="#fbbf24" />
                    </svg>
                </div>

                <div class="text-center">
                    <h1 class="text-5xl font-orbitron font-bold bg-clip-text text-transparent bg-gradient-to-b from-white to-blue-500 mb-2">TRI THỨC VŨ TRỤ</h1>
                    <p class="text-blue-200/50 tracking-[0.3em] uppercase text-xs">Phi hành đoàn lớp 4 & 5</p>
                </div>

                <div class="grid grid-cols-2 md:grid-cols-3 gap-4 w-full max-w-4xl">
                    <!-- Math -->
                    <button onclick="startMission('math')" class="mission-card group relative p-5 rounded-3xl border border-white/5 bg-white/[0.03] text-left">
                        <div class="text-2xl mb-3">📐</div>
                        <div class="font-bold text-lg text-blue-100">Toán Học</div>
                        <div class="text-[10px] text-blue-400 font-bold mt-2 opacity-0 group-hover:opacity-100 transition-opacity">BẮT ĐẦU →</div>
                    </button>

                    <!-- English -->
                    <button onclick="startMission('english')" class="mission-card group relative p-5 rounded-3xl border border-white/5 bg-white/[0.03] text-left">
                        <div class="text-2xl mb-3">🇬🇧</div>
                        <div class="font-bold text-lg text-pink-300">Tiếng Anh</div>
                        <div class="text-[10px] text-pink-400 font-bold mt-2 opacity-0 group-hover:opacity-100 transition-opacity">START MISSION →</div>
                    </button>

                    <!-- Science -->
                    <button onclick="startMission('science')" class="mission-card group relative p-5 rounded-3xl border border-white/5 bg-white/[0.03] text-left">
                        <div class="text-2xl mb-3">🔬</div>
                        <div class="font-bold text-lg text-green-300">Khoa Học</div>
                        <div class="text-[10px] text-green-400 font-bold mt-2 opacity-0 group-hover:opacity-100 transition-opacity">BẮT ĐẦU →</div>
                    </button>

                    <!-- History -->
                    <button onclick="startMission('history')" class="mission-card group relative p-5 rounded-3xl border border-white/5 bg-white/[0.03] text-left">
                        <div class="text-2xl mb-3">🌍</div>
                        <div class="font-bold text-lg text-orange-300">Sử - Địa</div>
                        <div class="text-[10px] text-orange-400 font-bold mt-2 opacity-0 group-hover:opacity-100 transition-opacity">BẮT ĐẦU →</div>
                    </button>

                    <!-- Language -->
                    <button onclick="startMission('language')" class="mission-card group relative p-5 rounded-3xl border border-white/5 bg-white/[0.03] text-left">
                        <div class="text-2xl mb-3">✍️</div>
                        <div class="font-bold text-lg text-purple-300">Tiếng Việt</div>
                        <div class="text-[10px] text-purple-400 font-bold mt-2 opacity-0 group-hover:opacity-100 transition-opacity">BẮT ĐẦU →</div>
                    </button>
                </div>
            </div>

            <!-- QUIZ SCREEN -->
            <div id="quiz-screen" class="hidden h-full flex flex-col fade-in">
                <div class="flex justify-between items-center mb-8">
                    <span id="mission-title" class="text-blue-400 text-[10px] font-bold uppercase tracking-[0.2em]">MISSION: MATH</span>
                    <div id="hearts-container" class="flex gap-1 text-red-500"></div>
                </div>

                <div class="flex-1 flex flex-col items-center justify-center space-y-10">
                    <div id="question-box" class="text-2xl font-bold text-center leading-snug text-white max-w-2xl"></div>
                    <div id="options-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4 w-full max-w-2xl"></div>
                </div>
            </div>

        </div>

        <!-- Feedback Overlay -->
        <div id="feedback-overlay" class="hidden absolute inset-0 z-50 bg-slate-950/95 flex flex-col items-center justify-center p-8 backdrop-blur-xl">
            <div id="fb-icon" class="text-7xl mb-6">✨</div>
            <h2 id="fb-title" class="text-4xl font-orbitron font-bold mb-3">CHÍNH XÁC!</h2>
            <p id="fb-msg" class="text-blue-300/70 mb-10 text-center"></p>
            <button id="next-btn" class="px-12 py-4 bg-blue-600 hover:bg-blue-500 rounded-2xl font-bold transition-all transform active:scale-95">TIẾP TỤC</button>
        </div>

    </div>

    <script>
        const missions = {
            math: [
                { q: "Diện tích hình thoi có độ dài hai đường chéo là 8cm và 10cm là bao nhiêu?", a: ["80 cm²", "40 cm²", "18 cm²", "20 cm²"], c: 1 },
                { q: "Tính: 3/4 + 1/2 = ?", a: ["4/6", "5/4", "1/4", "3/8"], c: 1 },
                { q: "0,5 giờ bằng bao nhiêu phút?", a: ["5 phút", "50 phút", "30 phút", "20 phút"], c: 2 }
            ],
            english: [
                { q: "Which animal has a long trunk and big ears?", a: ["Lion", "Elephant", "Monkey", "Giraffe"], c: 1 },
                { q: "Choose the opposite of 'FAST':", a: ["Slow", "Quick", "Happy", "Small"], c: 0 },
                { q: "Fill in the blank: 'She ___ a beautiful dress yesterday.'", a: ["wear", "wears", "wore", "wearing"], c: 2 },
                { q: "What is the capital city of Vietnam?", a: ["Ho Chi Minh City", "Da Nang", "Hue", "Ha Noi"], c: 3 },
                { q: "How many months are there in a year?", a: ["Seven", "Twelve", "Ten", "Four"], c: 1 }
            ],
            science: [
                { q: "Cơ quan nào trong cơ thể giúp chúng ta hô hấp?", a: ["Tim", "Dạ dày", "Phổi", "Thận"], c: 2 },
                { q: "Vật nào sau đây tự phát sáng?", a: ["Mặt Trăng", "Mặt Trời", "Trái Đất", "Sao Hỏa"], c: 1 }
            ],
            history: [
                { q: "Đà Lạt nằm trên cao nguyên nào?", a: ["Lâm Viên", "Di Linh", "Kon Tum", "Đắk Lắk"], c: 0 },
                { q: "Quốc gia nào ở phía tây nước ta?", a: ["Trung Quốc", "Lào", "Thái Lan", "Philippin"], c: 1 }
            ],
            language: [
                { q: "Từ nào đồng nghĩa với từ 'Hoà bình'?", a: ["Thanh bình", "Chiến tranh", "Ồn ào", "Hỗn loạn"], c: 0 },
                { q: "Câu 'Học, học nữa, học mãi' khuyên chúng ta điều gì?", a: ["Học tập suốt đời", "Chỉ học khi cần", "Ngừng học khi lớn", "Học ít thôi"], c: 0 }
            ]
        };

        let currentXP = 0, currentLevel = 1, lives = 3, questionIndex = 0, currentMission = [], missionKey = '';

        function initStars() {
            const container = document.getElementById('stars-bg');
            for (let i = 0; i < 120; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 3;
                star.style.width = star.style.height = `${size}px`;
                star.style.left = `${Math.random() * 100}%`;
                star.style.top = `${Math.random() * 100}%`;
                star.style.setProperty('--duration', `${Math.random() * 3 + 2}s`);
                container.appendChild(star);
            }
        }

        function updateHUD() {
            document.getElementById('player-xp').innerText = String(currentXP).padStart(4, '0');
            document.getElementById('player-level').innerText = `LVL ${String(currentLevel).padStart(2, '0')}`;
            document.getElementById('xp-bar').style.width = `${((currentXP % 500) / 500) * 100}%`;
            const hc = document.getElementById('hearts-container');
            hc.innerHTML = '❤️'.repeat(lives) + '🖤'.repeat(3 - lives);
        }

        function showHomeScreen() {
            document.getElementById('home-screen').classList.remove('hidden');
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('back-home').classList.add('hidden');
            document.getElementById('feedback-overlay').classList.add('hidden');
        }

        function startMission(key) {
            missionKey = key;
            currentMission = [...missions[key]].sort(() => Math.random() - 0.5);
            questionIndex = 0; lives = 3;
            document.getElementById('home-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            document.getElementById('back-home').classList.remove('hidden');
            document.getElementById('mission-title').innerText = `MISSION: ${key.toUpperCase()}`;
            updateHUD();
            showQuestion();
        }

        function showQuestion() {
            if (questionIndex >= currentMission.length) { showFinal(); return; }
            const qData = currentMission[questionIndex];
            document.getElementById('question-box').innerText = qData.q;
            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            qData.a.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = "answer-btn p-5 rounded-2xl border border-white/5 bg-white/[0.03] hover:border-blue-500/50 hover:bg-blue-500/10 text-left flex items-center gap-4 transition-all";
                btn.innerHTML = `<div class="w-10 h-10 rounded-xl bg-white/5 flex items-center justify-center font-orbitron text-sm font-bold text-blue-400">${String.fromCharCode(65 + idx)}</div><span class="text-gray-200 font-semibold">${opt}</span>`;
                btn.onclick = () => check(idx);
                grid.appendChild(btn);
            });
        }

        function check(idx) {
            const correct = currentMission[questionIndex].c === idx;
            const overlay = document.getElementById('feedback-overlay');
            if (correct) {
                currentXP += 100;
                document.getElementById('fb-title').innerText = "CHÍNH XÁC!";
                document.getElementById('fb-title').className = "text-4xl font-orbitron font-bold mb-3 text-green-400";
                document.getElementById('fb-msg').innerText = "Năng lượng tri thức được nạp thêm +100 XP.";
                document.getElementById('fb-icon').innerText = "🚀";
                if (currentXP >= currentLevel * 500) currentLevel++;
            } else {
                lives--;
                document.getElementById('fb-title').innerText = "CẢNH BÁO!";
                document.getElementById('fb-title').className = "text-4xl font-orbitron font-bold mb-3 text-red-500";
                document.getElementById('fb-msg').innerText = "Dữ liệu chưa đúng. Hãy thử lại!";
                document.getElementById('fb-icon').innerText = "⚠️";
            }
            updateHUD();
            overlay.classList.remove('hidden');
            document.getElementById('next-btn').onclick = () => {
                overlay.classList.add('hidden');
                if (correct) { questionIndex++; showQuestion(); }
                else if (lives <= 0) showHomeScreen();
            };
        }

        function showFinal() {
            const overlay = document.getElementById('feedback-overlay');
            document.getElementById('fb-title').innerText = "HOÀN THÀNH!";
            document.getElementById('fb-msg').innerText = "Nhiệm vụ thám hiểm đã hoàn tất. Bé thật giỏi!";
            document.getElementById('fb-icon').innerText = "🏆";
            document.getElementById('next-btn').onclick = showHomeScreen;
            overlay.classList.remove('hidden');
        }

        window.onload = () => { initStars(); updateHUD(); };
    </script>
</body>
</html>
